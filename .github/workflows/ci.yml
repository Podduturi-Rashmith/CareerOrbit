name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      # Dummy values so Next.js build doesn't fail on missing env vars
      GEMINI_API_KEY: dummy
      APP_URL: http://localhost:3000
      MONGODB_URI: mongodb://localhost:27017/careerorbit
      MONGODB_DB_NAME: careerorbit
      SESSION_SECRET: dummy-secret-for-ci-build-only
      DATA_ENCRYPTION_KEY: ZHVtbXkta2V5LWZvci1jaS1idWlsZC1vbmx5AAAA
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
